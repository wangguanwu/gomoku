name: UI Update

on:
  push:
    branches:
      - master
      - main
      - 'feat/**'
      - 'fix/**'
      - 'ui/**'
  pull_request:
    branches:
      - master
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run |
          npm install -g htmlhint stylelint eslint

      - name: Lint HTML
        run: htmlhint "*.html" || true

      - name: Lint CSS
        run: |
          echo '{"extends": "stylelint-config-standard"}' > .stylelintrc.json
          stylelint "*.css" || true

      - name: Lint JavaScript
        run: |
          echo "{\"env\": {\"browser\": true, \"es2020\": true}, \"globals\": {\"canvas\": true, \"document\": true, \"window\": true}}" > .eslintrc.json
          eslint "*.js" || true

  validate:
    name: Validate Resources
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run |
          echo "Validating HTML files..."
          for f in *.html; do
            if [ -f "$f" ]; then
              echo "Checking $f"
              if ! grep -q "<!DOCTYPE html>" "$f"; then
                echo "Missing DOCTYPE in $f"
                exit 1
              fi
              if ! grep -q "<html" "$f"; then
                echo "Missing html tag in $f"
                exit 1
              fi
              echo "$f is valid"
            fi
          done
          echo "Resource validation complete"
